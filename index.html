<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Годзи Шпиц</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #cceeff;
      font-family: sans-serif;
    }
    canvas {
      display: block;
      background: #e0f7fa;
    }
    #startScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #cceeff;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
    }
    #startButton, #pauseButton {
      padding: 10px 20px;
      font-size: 1.2em;
      background: #ffcc00;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }
    #pauseButton {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="startScreen">
    <h1 style="font-size:2em; margin-bottom:20px;">🎮 Годзи Шпиц</h1>
    <button id="startButton">Играть</button>
  </div>

  <button id="pauseButton" style="display: none;">⏸ Пауза</button>
  <canvas id="gameCanvas"></canvas>
  <audio id="bgMusic" src="music.mp3" loop></audio>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let width = window.innerWidth;
    let height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;

    const spitzHappy = new Image();
    spitzHappy.src = "images/spitz_happy.png";

    const spitzSad = new Image();
    spitzSad.src = "images/spitz_sad.png";

    const spitzNeutral = new Image();
    spitzNeutral.src = "images/spitz.png";

    const treatImg = new Image();
    treatImg.src = "images/treat.png";

    const coinImg = new Image();
    coinImg.src = "images/coin.png";

    const backgroundImg = new Image();
    backgroundImg.src = "images/background_forest.png";

    const spitz = {
      x: width / 2 - 40,
      y: height - 230,
      width: 80,
      height: 80,
      mood: "neutral",
      moodTimeout: null
    };

    const treats = [];
    let score = 0;
    let lives = 4;
    let isPaused = false;
    let isGameOver = false;

    function drawSpitz() {
      let image;
      if (spitz.mood === "happy") image = spitzHappy;
      else if (spitz.mood === "sad") image = spitzSad;
      else image = spitzNeutral;

      ctx.drawImage(image, spitz.x, spitz.y, spitz.width, spitz.height);
    }

    function drawBackground() {
      if (backgroundImg.complete && backgroundImg.naturalWidth > 0) {
        ctx.drawImage(backgroundImg, 0, 0, width, height);
      } else {
        ctx.fillStyle = "#e0f7fa";
        ctx.fillRect(0, 0, width, height);
      }
    }

    function hideStumpUnderSpitz() {
      const patchX = spitz.x + spitz.width / 2;
      const patchY = Math.min(spitz.y + spitz.height + 35, height - 40);

      ctx.fillStyle = "#6eae5d";
      ctx.beginPath();
      ctx.ellipse(patchX, patchY, 95, 42, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function setMood(mood) {
      spitz.mood = mood;
      if (spitz.moodTimeout) clearTimeout(spitz.moodTimeout);
      spitz.moodTimeout = setTimeout(() => spitz.mood = "neutral", 800);
    }

    function drawTreats() {
      const treatSize = 30;
      const treatRadius = treatSize / 2;

      for (let i = 0; i < treats.length; i++) {
        const t = treats[i];
        t.y += 5;
        ctx.drawImage(treatImg, t.x - treatRadius, t.y - treatRadius, treatSize, treatSize);

        const treatLeft = t.x - treatRadius;
        const treatRight = t.x + treatRadius;
        const treatTop = t.y - treatRadius;
        const treatBottom = t.y + treatRadius;
        const spitzRight = spitz.x + spitz.width;
        const spitzBottom = spitz.y + spitz.height;
        const isCaught =
          treatRight > spitz.x &&
          treatLeft < spitzRight &&
          treatBottom > spitz.y &&
          treatTop < spitzBottom;

        if (isCaught) {
          score++;
          setMood("happy");
          treats.splice(i, 1);
          i--;
        } else if (t.y > height) {
          lives--;
          setMood("sad");
          treats.splice(i, 1);
          i--;

          if (lives <= 0) {
            lives = 0;
            isGameOver = true;
            isPaused = true;
            document.getElementById("pauseButton").innerText = "Игра окончена";
          }
        }
      }
    }

    function drawScore() {
      ctx.fillStyle = "black";
      ctx.font = "24px sans-serif";
      ctx.fillText("Годзикойны: " + score, 60, 40);
      ctx.drawImage(coinImg, 20, 12, 30, 30);
      ctx.fillText("Жизни: " + lives, 20, 80);
    }

    function drawGameOver() {
      if (!isGameOver) return;
      ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 42px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Игра окончена", width / 2, height / 2 - 20);
      ctx.font = "28px sans-serif";
      ctx.fillText("Счёт: " + score, width / 2, height / 2 + 25);
      ctx.textAlign = "left";
    }

    function update() {
      if (isPaused) return;

      ctx.clearRect(0, 0, width, height);
      drawBackground();
      hideStumpUnderSpitz();
      drawSpitz();
      drawTreats();
      drawScore();
      drawGameOver();
      requestAnimationFrame(update);
    }

    function dropTreat() {
      if (!isPaused && !isGameOver) {
        treats.push({ x: 15 + Math.random() * (width - 30), y: 0 });
      }
    }

    const treatInterval = setInterval(dropTreat, 1200);

    function moveSpitzTo(x) {
      spitz.x = Math.min(Math.max(x - spitz.width / 2, 0), width - spitz.width);
    }

    canvas.addEventListener("mousemove", e => moveSpitzTo(e.clientX));
    canvas.addEventListener("touchmove", e => {
      e.preventDefault();
      moveSpitzTo(e.touches[0].clientX);
    }, { passive: false });

    document.getElementById("startButton").addEventListener("click", () => {
      document.getElementById("startScreen").style.display = "none";
      document.getElementById("pauseButton").style.display = "block";
      document.getElementById("bgMusic")?.play();
      update();
    });

    document.getElementById("pauseButton").addEventListener("click", () => {
      if (isGameOver) return;
      isPaused = !isPaused;
      document.getElementById("pauseButton").innerText = isPaused ? "▶ Продолжить" : "⏸ Пауза";
      if (!isPaused) update();
    });
  </script>
</body>
</html>
